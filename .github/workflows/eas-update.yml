name: Publish Expo update

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      channel:
        default: preview
        description: EAS channel to update
        options:
          - preview
          - production
        required: true
        type: choice

jobs:
  update:
    name: Publish EAS Update
    runs-on: ubuntu-latest
    env:
      CI: 1
      EAS_UPDATE_CHANNEL: ${{ inputs.channel || 'preview' }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_MUSLIMIN_API_URL: ${{ vars.EXPO_PUBLIC_MUSLIMIN_API_URL || vars.EXPO_PUBLIC_TOURS_MUSLIM_API_URL }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Check Expo token
        id: expo-token
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "EXPO_TOKEN is not configured. Skipping EAS Update."
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish update
        if: steps.expo-token.outputs.has_token == 'true'
        run: npx eas-cli update --channel "$EAS_UPDATE_CHANNEL" --message "GitHub $GITHUB_SHA" --non-interactive
